name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/turbo.json', 'bun.lock') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Execute Pipeline (Check, Test, Build)
        run: bun x turbo run check test build

      - name: Coverage & Mutation
        run: bun x turbo run coverage mutation

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: |
            packages/*/coverage/
            packages/*/badges/
          if-no-files-found: ignore

      - name: Upload Mutation Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-reports
          path: packages/*/reports/
          if-no-files-found: ignore
